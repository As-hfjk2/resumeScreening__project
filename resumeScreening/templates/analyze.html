<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SmartScreen - Analyze</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

</head>
<style>
    /* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #eef2ff, #f8fafc);
    color: #1e293b;
}

/* NAVBAR */
.navbar {
    padding: 20px 60px;
    font-weight: 600;
    font-size: 20px;
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(0,0,0,0.05);
}

/* CONTAINER */
.container {
    display: flex;
    justify-content: center;
    padding: 50px 20px;
}

/* GLASS CARD */
.glass-card {
    width: 100%;
    max-width: 1000px;
    padding: 40px;
    border-radius: 18px;
    background: rgba(255,255,255,0.65);
    backdrop-filter: blur(20px);
    box-shadow: 0 10px 40px rgba(0,0,0,0.08);
}

/* TITLE */
h2 {
    margin-bottom: 25px;
    font-weight: 600;
}

/* INPUT LAYOUT */
.input-section {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
}

/* DRAG DROP */
.upload-box {
    flex: 1;
    border: 2px dashed #3b82f6;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 150px;
    cursor: pointer;
    color: #3b82f6;
    font-weight: 500;
    transition: 0.3s;
}

.upload-box:hover {
    background: rgba(59,130,246,0.08);
}

.upload-box input {
    display: none;
}

/* TEXTAREA */
textarea {
    flex: 1;
    height: 150px;
    border-radius: 14px;
    border: 1px solid #e2e8f0;
    padding: 15px;
    font-size: 14px;
    resize: none;
}

/* BUTTON */
.btn {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, #2563eb, #3b82f6);
    color: white;
    font-weight: 500;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(37,99,235,0.3);
}

/* RESULT SECTION */
.result {
    margin-top: 40px;
    display: flex;
    gap: 40px;
    align-items: center;
}

/* CIRCLE */
.circle {
    position: relative;
    width: 140px;
    height: 140px;
}

svg {
    transform: rotate(-90deg);
}

circle {
    fill: none;
    stroke-width: 10;
    stroke: #e5e7eb;
}

#progress {
    stroke: #3b82f6;
    stroke-dasharray: 377;
    stroke-dashoffset: 377;
    transition: 1s ease;
}

.number {
    position: absolute;
    top: 45px;
    left: 45px;
    font-size: 20px;
    font-weight: 600;
}

/* SKILLS */
.skills {
    flex: 1;
}

.skills h3 {
    margin-bottom: 15px;
}

.skill {
    margin-bottom: 12px;
}

.skill span {
    font-size: 14px;
    font-weight: 500;
}

/* BARS */
.bar {
    height: 8px;
    background: #e5e7eb;
    border-radius: 10px;
    margin-top: 5px;
}

.fill {
    height: 100%;
    border-radius: 10px;
}

.match {
    width: 85%;
    background: linear-gradient(90deg, #22c55e, #4ade80);
}

.missing {
    width: 40%;
    background: linear-gradient(90deg, #ef4444, #f87171);
}

/* LOADER */
.loader {
    position: fixed;
    inset: 0;
    background: rgba(255,255,255,0.6);
    display: none;
    justify-content: center;
    align-items: center;
    backdrop-filter: blur(5px);
}

.spinner {
    width: 50px;
    height: 50px;
    border: 5px solid #e5e7eb;
    border-top: 5px solid #2563eb;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

/* RESPONSIVE */
@media (max-width: 768px) {
    .input-section {
        flex-direction: column;
    }

    .result {
        flex-direction: column;
        text-align: center;
    }
}
</style>
<body>

<!-- Navbar -->
<div class="navbar">
    <div class="logo">SmartScreen</div>
</div>

<div class="container">

    <div class="glass-card">

        <h2>AI Resume Analyzer</h2>

        <form id="form" action="/analyze" method="post" enctype="multipart/form-data">

            <div class="input-section">

                <!-- Drag & Drop -->
                <div class="upload-box" id="drop-area">
                    <p>Drag & Drop Resume</p>
                    <input type="file" name="resume" id="fileInput" required>
                </div>

                <!-- Job Description -->
                <div class="jd-box">
                    <textarea name="job_desc" placeholder="Paste Job Description..." required></textarea>
                </div>

            </div>

            <button class="btn">Analyze Resume</button>
        </form>

        <!-- RESULT -->
        {% if score %}
        <div class="result">

            <!-- Circular Score -->
            <div class="circle">
                <svg>
                    <circle cx="70" cy="70" r="60"></circle>
                    <circle cx="70" cy="70" r="60" id="progress"></circle>
                </svg>
                <div class="number">{{ score }}%</div>
            </div>

            <!-- Skills -->
            <div class="skills">

                <h3>Skill Match</h3>

                {% for skill in matched %}
                <div class="skill">
                    <span>{{ skill }}</span>
                    <div class="bar">
                        <div class="fill match"></div>
                    </div>
                </div>
                {% endfor %}

                {% for skill in missing %}
                <div class="skill">
                    <span>{{ skill }}</span>
                    <div class="bar">
                        <div class="fill missing"></div>
                    </div>
                </div>
                {% endfor %}

            </div>

        </div>
        {% endif %}

    </div>

</div>

<!-- Loader -->
<div id="loader" class="loader">
    <div class="spinner"></div>
</div>

<script src="analyze.js"></script>
</body>
</html>
